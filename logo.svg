<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <!-- Background -->
  <rect width="300" height="100" rx="12" fill="#1E3A8A"/>

  <!-- Icon group (scaled down from 128x128 to ~80x80, centered vertically) -->
  <g transform="translate(10, 10) scale(0.625)">
    <!-- Icon background -->
    <rect width="128" height="128" rx="20" fill="#2563EB"/>

    <!-- House body -->
    <rect x="22" y="58" width="84" height="54" fill="white"/>

    <!-- Roof -->
    <polygon points="64,12 114,63 14,63" fill="white"/>

    <!-- Chimney -->
    <rect x="78" y="28" width="10" height="22" fill="white"/>

    <!-- Door -->
    <rect x="50" y="74" width="28" height="38" rx="3" fill="#2563EB"/>

    <!-- Guest person in doorway -->
    <circle cx="64" cy="82" r="6.5" fill="white"/>
    <ellipse cx="64" cy="100" rx="9.5" ry="7" fill="white"/>

    <!-- Key hint -->
    <g transform="translate(88, 88) rotate(-35)">
      <circle cx="0" cy="0" r="6" fill="none" stroke="white" stroke-width="2.5" opacity="0.7"/>
      <rect x="5" y="-1.5" width="12" height="3" rx="1" fill="white" opacity="0.7"/>
      <rect x="13" y="1.5" width="3" height="3" rx="0.5" fill="white" opacity="0.7"/>
      <rect x="10" y="1.5" width="3" height="2" rx="0.5" fill="white" opacity="0.7"/>
    </g>
  </g>

  <!-- Subtle divider line between icon and text -->
  <line x1="100" y1="18" x2="100" y2="82" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>

  <!-- Text: main name -->
  <text
    x="115"
    y="43"
    font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-size="26"
    font-weight="700"
    fill="white"
    letter-spacing="-0.5"
  >Guest Entry</text>

  <!-- Text: subtitle -->
  <text
    x="116"
    y="65"
    font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-size="13"
    font-weight="400"
    fill="#93C5FD"
    letter-spacing="0.3"
  >Home Assistant App</text>
</svg>
