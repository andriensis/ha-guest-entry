name: Guest Entry
description: Expose selected HA entities to guests with per-user access control
version: "1.0.0"
slug: ha_guest_entry
url: https://github.com/andriensis/ha-guest-entry
startup: application
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

ports:
  7979/tcp: 7979
  7980/tcp: null

watchdog: http://[HOST]:[PORT:7979]/api/v1/health

ingress: true
ingress_port: 7980

auth_api: true
homeassistant_api: true
hassio_api: true

map:
  - config:rw

options: {}
schema: {}
